<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contact.page.title">ติดต่อ — WebExpressTH</title>
  <meta name="description" content="Get in touch with WebExpressTH — reach us on Facebook, LINE, or email, or send a message via the contact form.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="WebExpressTH">
  <meta property="og:title" content="Contact — WebExpressTH">
  <meta property="og:url" content="https://www.webexpressth.com/contact.html">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://www.webexpressth.com/contact.html">
</head>

<body>
  <div id="page-loader" aria-hidden="true">
    <div class="page-loader__ring"></div>
    <span class="page-loader__wordmark">WebExpressTH</span>
  </div>

  <nav></nav>

  <main>

    <!-- ── Page Header ───────────────────────────────────── -->
    <section class="contact-hero-section">
      <div class="container">
        <h1 class="contact-page-title" data-i18n="contact.hero.title">มาร่วมงานกันเถอะ</h1>
        <p class="contact-page-subtitle" data-i18n="contact.hero.subtitle">
          พร้อมสร้างเว็บไซต์หรือยัง?
        </p>
      </div>
    </section>

    <!-- ── Contact Channels ───────────────────────────────── -->
    <section class="contact-channels-section">
      <div class="container">
        <div class="contact-channels-grid">

          <!-- Facebook -->
          <a class="contact-channel-card" href="https://www.facebook.com/webexpressth/" target="_blank" rel="noopener noreferrer">
            <span class="contact-channel-icon contact-channel-icon--fb" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                <path d="M22 12c0-5.522-4.478-10-10-10S2 6.478 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12z"/>
              </svg>
            </span>
            <span class="contact-channel-label" data-i18n="contact.channel.facebook.label">Facebook</span>
            <span class="contact-channel-value">WebExpressTH</span>
            <span class="contact-channel-action" data-i18n="contact.channel.facebook.action">ไปที่ Facebook →</span>
          </a>

          <!-- LINE -->
          <a class="contact-channel-card" href="https://line.me/ti/p/~pakornp" target="_blank" rel="noopener noreferrer">
            <span class="contact-channel-icon contact-channel-icon--line" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
              </svg>
            </span>
            <span class="contact-channel-label" data-i18n="contact.channel.line.label">LINE</span>
            <span class="contact-channel-value">LINE ID</span>
            <span class="contact-channel-action" data-i18n="contact.channel.line.action">แอดไลน์ →</span>
          </a>

          <!-- Email -->
          <a class="contact-channel-card" href="mailto:hello@webexpressth.com">
            <span class="contact-channel-icon contact-channel-icon--email" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <span class="contact-channel-label" data-i18n="contact.channel.email.label">อีเมล</span>
            <span class="contact-channel-value">hello@webexpressth.com</span>
            <span class="contact-channel-action" data-i18n="contact.channel.email.action">ส่งอีเมล →</span>
          </a>

        </div>
      </div>
    </section>

    <!-- ── Contact Form ───────────────────────────────────── -->
    <section class="contact-form-section">
      <div class="container">
        <div class="contact-form-inner">
          <h2 class="contact-form-heading" data-i18n="contact.form.title">ฝากข้อความไว้กับเรา</h2>

          <form id="contact-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="contact-name" data-i18n="contact.form.name.label">ชื่อของคุณหรือชื่อบริษัท</label>
              <input class="form-control" type="text" id="contact-name" name="name"
                autocomplete="name"
                data-i18n-placeholder="contact.form.name.placeholder"
                placeholder="ชื่อ นามสกุล หรือชื่อบริษัท" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="contact-contact" data-i18n="contact.form.contact.label">อีเมลหรือ LINE ID</label>
              <input class="form-control" type="text" id="contact-contact" name="contact"
                data-i18n-placeholder="contact.form.contact.placeholder"
                placeholder="email@example.com หรือ @lineid" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="contact-message" data-i18n="contact.form.message.label">ข้อความ</label>
              <textarea class="form-control" id="contact-message" name="message"
                data-i18n-placeholder="contact.form.message.placeholder"
                placeholder="เล่าให้เราฟังเกี่ยวกับโปรเจกต์ของคุณ..." required></textarea>
            </div>

            <button class="btn btn-primary" type="submit" data-i18n="contact.form.submit">ส่งข้อความ →</button>

            <p class="contact-form-success" hidden data-i18n="contact.form.success">
              ขอบคุณ! เราจะติดต่อกลับภายในหนึ่งวันทำการ
            </p>
          </form>
        </div>
      </div>
    </section>

  </main>

  <footer></footer>
</body>

</html>
